<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ish's song recs</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --yellow: #FFF5A0;
    --teal: #008080;
    --teal-dark: #005f5f;
    --ink: #1a2a2a;
    --muted: #4a6a6a;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    font-family: 'Syne', sans-serif;
    background: var(--yellow);
    overflow-x: hidden;
  }

  .screen {
    display: none;
    min-height: 100vh;
    width: 100%;
    background: var(--yellow);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 20px;
    border: 1.5px solid var(--teal);
    padding: 5px 14px;
    border-radius: 999px;
    display: inline-block;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3.4rem, 12vw, 8rem);
    font-weight: 800;
    color: var(--teal);
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin-bottom: 28px;
    text-align: center;
  }

  h1 .thin {
    font-weight: 400;
    color: var(--ink);
  }

  .landing-sub {
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 52px;
    line-height: 1.7;
    text-align: center;
  }

  .dots {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
  }
  .dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    opacity: 0.3;
  }
  .dots span:nth-child(2) { opacity: 0.6; }
  .dots span:nth-child(3) { opacity: 1; }

  .camera-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--teal);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.2s ease;
    box-shadow: 0 4px 24px rgba(0,128,128,0.25);
  }

  .camera-btn:hover {
    background: var(--teal-dark);
    transform: scale(1.08);
  }

  .camera-btn svg {
    width: 30px;
    height: 30px;
    stroke: var(--yellow);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .camera-hint {
    margin-top: 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--teal);
  }

  .upload-header {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .back-btn {
    background: none;
    border: 1.5px solid var(--teal);
    color: var(--teal);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .back-btn:hover { background: var(--teal); color: var(--yellow); }

  .upload-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    color: var(--teal);
    letter-spacing: -0.03em;
  }

  .drop-zone {
    width: 100%;
    max-width: 560px;
    border: 2px dashed rgba(0,128,128,0.35);
    border-radius: 16px;
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
    background: rgba(255,255,255,0.35);
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--teal);
    background: rgba(0,128,128,0.05);
  }

  .drop-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 52px;
    height: 52px;
    margin: 0 auto 18px;
    background: rgba(0,128,128,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .drop-icon svg {
    width: 24px;
    height: 24px;
    stroke: var(--teal);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .drop-label {
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }

  .drop-hint {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .preview-wrap {
    width: 100%;
    max-width: 560px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .preview-wrap.visible { display: flex; }

  .preview-img {
    width: 100%;
    max-height: 360px;
    object-fit: cover;
    border-radius: 12px;
    display: block;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .btn-secondary {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1.5px solid rgba(0,128,128,0.4);
    color: var(--teal);
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
  }

  .btn-secondary:hover { border-color: var(--teal); background: rgba(0,128,128,0.06); }

  .btn-primary {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--teal);
    color: var(--yellow);
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    flex: 2;
  }

  .btn-primary:hover { background: var(--teal-dark); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 40px;
    width: 100%;
    max-width: 560px;
  }
  .loading-wrap.visible { display: flex; }

  .vinyl {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 6px solid var(--teal);
    border-top-color: transparent;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
  }

  .result-card {
    width: 100%;
    max-width: 560px;
    background: var(--teal);
    border-radius: 16px;
    padding: 36px 32px;
    display: none;
    animation: fadeIn 0.5s ease;
  }
  .result-card.visible { display: block; }

  .result-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,245,160,0.6);
    margin-bottom: 16px;
  }

  .result-song {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--yellow);
    line-height: 1.05;
    margin-bottom: 8px;
  }

  .result-artist {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,245,160,0.7);
    margin-bottom: 24px;
  }

  .result-divider {
    width: 32px;
    height: 2px;
    background: rgba(255,245,160,0.4);
    margin-bottom: 20px;
    border-radius: 2px;
  }

  .result-reason {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.75;
    color: rgba(255,245,160,0.85);
  }

  .try-again-btn {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: rgba(255,245,160,0.15);
    color: var(--yellow);
    border: 1.5px solid rgba(255,245,160,0.3);
    padding: 11px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 24px;
    width: 100%;
  }
  .try-again-btn:hover { background: rgba(255,245,160,0.25); }

  .error-msg {
    font-size: 12px;
    font-weight: 600;
    color: #c0392b;
    text-align: center;
    padding: 10px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="screen active" id="screenLanding">
  <div class="tag">by ishvari</div>
  <h1>ish's<br><span class="thin">song</span><br>recs</h1>
  <div class="dots"><span></span><span></span><span></span></div>
  <p class="landing-sub">drop a photo.<br>get the song that fits.</p>
  <button class="camera-btn" id="goToUpload" aria-label="upload a photo">
    <svg viewBox="0 0 24 24">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </button>
  <p class="camera-hint">tap to start</p>
</div>

<div class="screen" id="screenUpload">
  <div class="upload-header">
    <button class="back-btn" id="backBtn">←</button>
    <h2 class="upload-title">drop your photo</h2>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" />
    <div class="drop-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="16 16 12 12 8 16"/>
        <line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
    </div>
    <p class="drop-label">drag & drop here</p>
    <p class="drop-hint">or click to browse your photos</p>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img class="preview-img" id="previewImg" src="" alt="your photo" />
    <div class="btn-row">
      <button class="btn-secondary" id="changeBtn">change photo</button>
      <button class="btn-primary" id="askBtn">find my song →</button>
    </div>
  </div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="vinyl"></div>
    <p class="loading-text">reading the vibe...</p>
  </div>

  <p class="error-msg" id="errorMsg"></p>

  <div class="result-card" id="resultCard">
    <p class="result-eyebrow">your song</p>
    <p class="result-song" id="songTitle"></p>
    <p class="result-artist" id="songArtist"></p>
    <div class="result-divider"></div>
    <p class="result-reason" id="songReason"></p>
    <button class="try-again-btn" id="tryAgainBtn">try another photo</button>
  </div>
</div>

<script>
  const screenLanding = document.getElementById('screenLanding');
  const screenUpload  = document.getElementById('screenUpload');
  const goToUpload    = document.getElementById('goToUpload');
  const backBtn       = document.getElementById('backBtn');
  const dropZone      = document.getElementById('dropZone');
  const fileInput     = document.getElementById('fileInput');
  const previewWrap   = document.getElementById('previewWrap');
  const previewImg    = document.getElementById('previewImg');
  const changeBtn     = document.getElementById('changeBtn');
  const askBtn        = document.getElementById('askBtn');
  const loadingWrap   = document.getElementById('loadingWrap');
  const resultCard    = document.getElementById('resultCard');
  const errorMsg      = document.getElementById('errorMsg');
  const tryAgainBtn   = document.getElementById('tryAgainBtn');

  let currentBase64 = null;
  let currentMime = 'image/jpeg';

  function show(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  goToUpload.addEventListener('click', () => show(screenUpload));
  backBtn.addEventListener('click', () => { resetUpload(); show(screenLanding); });

  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  function handleFile(file) {
    currentMime = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = (e) => {
      currentBase64 = e.target.result.split(',')[1];
      previewImg.src = e.target.result;
      dropZone.style.display = 'none';
      previewWrap.classList.add('visible');
      resultCard.classList.remove('visible');
      errorMsg.textContent = '';
    };
    reader.readAsDataURL(file);
  }

  changeBtn.addEventListener('click', () => {
    dropZone.style.display = '';
    previewWrap.classList.remove('visible');
    resultCard.classList.remove('visible');
    fileInput.value = '';
    currentBase64 = null;
  });

  tryAgainBtn.addEventListener('click', () => {
    resultCard.classList.remove('visible');
    dropZone.style.display = '';
    previewWrap.classList.remove('visible');
    fileInput.value = '';
    currentBase64 = null;
  });

  function resetUpload() {
    dropZone.style.display = '';
    previewWrap.classList.remove('visible');
    loadingWrap.classList.remove('visible');
    resultCard.classList.remove('visible');
    errorMsg.textContent = '';
    fileInput.value = '';
    currentBase64 = null;
  }

  askBtn.addEventListener('click', async () => {
    if (!currentBase64) return;
    previewWrap.classList.remove('visible');
    loadingWrap.classList.add('visible');
    resultCard.classList.remove('visible');
    errorMsg.textContent = '';

    const systemPrompt = `You are Ishvari's music taste embodied. You recommend songs that match the vibe of a photo.

Ishvari's taste spans: indie/alt (The Strokes, Arctic Monkeys, The 1975, TV Girl, Tame Impala, Spacey Jane, Dayglow, Still Woozy, Rex Orange County, Smallpools, Goth Babe), chill R&B/soul (Frank Ocean, Daniel Caesar, KAYTRANADA, Childish Gambino, Lucky Daye, Anderson .Paak, SG Lewis, Blood Orange, Giveon, Fousheé), rap/hip-hop (Mac Miller, J. Cole, Kid Cudi, A$AP Rocky, Kendrick Lamar, Cordae, Chance the Rapper, Drake), dreamy/electronic (MGMT, Daft Punk, Fred again.., Big Wild, Mild Minds, Toro y Moi, FKJ), and soft indie vibes (Khruangbin, Pale Jay, Drugdealer, Local Natives, Bakar, Quinn XCII, Bryce Vine, NoMBe).

When given an image, analyze its mood, colors, setting, time of day, emotional feeling, and visual texture. Then pick ONE song from artists similar to Ishvari's taste that perfectly matches the vibe.

Respond ONLY in this exact JSON format with no extra text or markdown:
{"title": "Song Title", "artist": "Artist Name", "reason": "2-3 sentence explanation of why this song matches the photo's vibe, written in a warm conversational tone"}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: currentMime, data: currentBase64 } },
              { type: 'text', text: 'What song does this photo feel like?' }
            ]
          }]
        })
      });

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      document.getElementById('songTitle').textContent = parsed.title;
      document.getElementById('songArtist').textContent = parsed.artist;
      document.getElementById('songReason').textContent = parsed.reason;

      loadingWrap.classList.remove('visible');
      resultCard.classList.add('visible');

    } catch (err) {
      loadingWrap.classList.remove('visible');
      previewWrap.classList.add('visible');
      errorMsg.textContent = 'something went wrong — try again?';
      console.error(err);
    }
  });
</script>
</body>
</html>
